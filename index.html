<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>vibe - Premium Stride Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Rubik:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Rubik', 'Inter', sans-serif; background-color: #030406; color: white; overflow: hidden; margin: 0; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .emerald-gradient { background: linear-gradient(135deg, #10b981 0%, #06b6d4 100%); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div id="app" class="w-full max-w-md p-6">
        <!-- Status Card -->
        <div id="status-display" class="glass-card p-8 rounded-3xl text-center shadow-2xl mb-6">
            <h1 class="text-4xl font-black mb-2 text-emerald-400">vibe</h1>
            <p id="conn-status" class="text-slate-400 text-sm">מאתחל מערכות...</p>
        </div>

        <!-- Main Interaction Area -->
        <div id="main-content" class="hidden flex flex-col items-center">
            <div id="orb" class="w-64 h-64 rounded-full border-4 border-slate-800 flex items-center justify-center mb-8 cursor-pointer active:scale-95 transition-transform" onclick="manualStep()">
                <span id="step-count" class="text-6xl font-black">0</span>
            </div>
            <button id="walk-btn" onclick="toggleWalkMode()" class="w-full py-4 rounded-2xl emerald-gradient font-bold text-white shadow-lg">
                התחל הליכה
            </button>
        </div>

        <canvas id="burstCanvas" class="fixed inset-0 pointer-events-none"></canvas>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // הגדרות Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBEnJu0jIQLJgb2A5OJGp9kP9lbldBTxNM",
            authDomain: "vibesteps-9057c.firebaseapp.com",
            projectId: "vibesteps-9057c",
            storageBucket: "vibesteps-9057c.firebasestorage.app",
            messagingSenderId: "949644307582",
            appId: "1:949644307582:web:0e37f462972f85cfa83c2f"
        };

        let steps = 0;
        let isWalking = false;

        // לוגיקה גלובלית
        window.manualStep = () => {
            steps++;
            document.getElementById('step-count').innerText = steps;
            triggerBurst();
        };

        window.toggleWalkMode = () => {
            isWalking = !isWalking;
            const btn = document.getElementById('walk-btn');
            btn.innerText = isWalking ? "עצור הליכה" : "התחל הליכה";
            btn.classList.toggle('opacity-80', isWalking);
        };

        function triggerBurst() {
            console.log("Particle burst triggered");
        }

        window.initBurstCanvas = () => {
            const canvas = document.getElementById('burstCanvas');
            if (canvas) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        };

        // אתחול Firebase
        async function setupApp() {
            try {
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                await signInAnonymously(auth);
                return true;
            } catch (e) {
                console.error("Firebase Auth Error:", e);
                return false;
            }
        }

        // טעינת האפליקציה לאחר שה-DOM מוכן
        document.addEventListener('DOMContentLoaded', async () => {
            console.log("App booting...");
            window.initBurstCanvas();
            
            const status = document.getElementById('conn-status');
            const mainContent = document.getElementById('main-content');
            
            const isConnected = await setupApp();
            
            if (isConnected) {
                status.innerText = "מוכן להליכה";
                status.classList.replace('text-slate-400', 'text-emerald-400');
                mainContent.classList.remove('hidden');
            } else {
                status.innerText = "שגיאת חיבור לענן";
                status.classList.replace('text-slate-400', 'text-rose-500');
            }
        });

        // ריסייז גלובלי
        window.addEventListener('resize', () => window.initBurstCanvas());
    </script>
</body>
</html>
